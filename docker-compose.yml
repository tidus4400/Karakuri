services:
  postgres:
    image: postgres:16
    container_name: automationplatform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: automation
      POSTGRES_PASSWORD: automation
      POSTGRES_DB: automationplatform
    ports:
      - "5432:5432"
    volumes:
      - automationplatform_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automation -d automationplatform"]
      interval: 10s
      timeout: 5s
      retries: 5

  orchestrator:
    container_name: automationplatform-orchestrator
    build:
      context: .
      dockerfile: docker/Dockerfile.orchestrator
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=automationplatform;Username=automation;Password=automation
    ports:
      - "5010:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    container_name: automationplatform-web
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Orchestrator__BaseUrl: http://orchestrator:8080
    ports:
      - "5020:8080"
    depends_on:
      orchestrator:
        condition: service_started

  runner:
    container_name: automationplatform-runner
    build:
      context: .
      dockerfile: docker/Dockerfile.runner
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Production
      Runner__ServerUrl: http://orchestrator:8080
      Runner__RegistrationToken: ""
      Runner__Name: docker-runner
      Runner__Tags: docker
      Runner__CredentialFile: /data/runner.credentials.json
    volumes:
      - automationplatform_runnerdata:/data
    depends_on:
      orchestrator:
        condition: service_started

volumes:
  automationplatform_pgdata:
  automationplatform_runnerdata:
